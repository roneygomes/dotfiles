# =============================================
# ERGONOMICS & PREFIX
# =============================================

# Change prefix to Ctrl+w
set -g prefix C-w
unbind C-b
bind C-w send-prefix

# Start window and pane numbering at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Don't auto-rename — we control window names
setw -g automatic-rename off

# Re-number windows when one is closed
set -g renumber-windows on

# =============================================
# NAVIGATION & SPLITS
# =============================================

# Use v and s for intuitive vertical and horizontal splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Use Vim keys (h, j, k, l) to switch panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+i / Alt+o: previous/next window with indicator
bind -n M-i run-shell -b 'tmux previous-window && ~/.local/bin/tmux-winlist'
bind -n M-o run-shell -b 'tmux next-window && ~/.local/bin/tmux-winlist'

# Alt+w: close current window (with confirmation)
bind -n M-w confirm-before -p "close window '#{window_name}'? (y/n)" kill-window

# Alt+p: window picker
bind -n M-p display-popup -E -w 50 -h 20 -B '~/.local/bin/tmux-picker'

# Alt+s: session picker (tms)
bind -n M-s display-popup -E -w 50 -h 20 -B '~/.local/bin/tms'

# Alt+Shift+p: session picker (tms)
bind -n M-P display-popup -E -w 50 -h 20 -B '~/.local/bin/tms'

# Mouse support with smoother scrolling
set -g mouse on

# Scroll 3 lines at a time (default 5 is too jumpy, 1 is too slow)
bind -T copy-mode WheelUpPane   send-keys -X -N 3 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 3 scroll-down

# =============================================
# COPY MODE (SCROLLBACK)
# =============================================

# Use emacs keys in copy mode (frees Ctrl+e for Claude Code scrollback)
setw -g mode-keys emacs

# Increase scrollback history (default is too low)
set -g history-limit 50000

# =============================================
# LOOK & FEEL
# =============================================

# Enable TrueColor
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Allow escape sequences (eg. iTerm2 notifications) to pass through to the terminal
set -g allow-passthrough on

# Set iTerm2 tab title to match status bar format
set -g set-titles on
set -g set-titles-string "#(whoami)@#h :: #{session_name}"

# Refresh interval
set -g status-interval 5

# Window list on the left; clock on the right
set -g status-justify left
set -g status-style "bg=default"

# Left: user@host :: session | (windows follow)
set -g status-left-length 60
set -g status-left "#[fg=brightblack] #(whoami)@#h #[fg=brightblack]:: #[fg=blue,bold]#S #[fg=brightblack,nobold]│ "

# Right: clock
set -g status-right-length 30
set -g status-right "#[fg=blue,bold]%H:%M "

# Window list: all windows shown after the left status
setw -g window-status-format "#[fg=brightblack] #W "
setw -g window-status-current-format "#[fg=blue,bg=default,bold] #W#{?window_zoomed_flag, ●,} "

# Message text
set -g message-style "fg=yellow,bg=default,bold"

# =============================================
# PLUGINS (TPM)
# =============================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
