# =============================================
# ERGONOMICS & PREFIX
# =============================================

# Change prefix to Ctrl+w
set -g prefix C-w
unbind C-b
bind C-w send-prefix

# Start window and pane numbering at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Rename window to reflect current program (overridden per-window by cs)
setw -g automatic-rename on

# Re-number windows when one is closed
set -g renumber-windows on

# =============================================
# NAVIGATION & SPLITS
# =============================================

# Use v and s for intuitive vertical and horizontal splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Use Vim keys (h, j, k, l) to switch panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+o / Alt+i for previous/next window (vim jumplist feel)
bind -n M-i previous-window
bind -n M-o next-window

# Alt+p for scoped worktree picker (popup)
bind -n M-p run-shell -b 'tmux display-popup -E -e CS_TARGET_PANE="#{pane_id}" -e CS_MODE="#{@cs_name}" "cs go || true"'

# Enable mouse support (scrolling, clicking, resizing)
set -g mouse on

# =============================================
# COPY MODE (SCROLLBACK)
# =============================================

# Use Vim keys in copy mode (Prefix + [)
setw -g mode-keys vi

# Increase scrollback history (default is too low)
set -g history-limit 50000

# =============================================
# LOOK & FEEL
# =============================================

# Enable TrueColor
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Set iTerm2 tab title to tmux session name
set -g set-titles on
set -g set-titles-string "#{session_name}"

# Refresh interval
set -g status-interval 5

# Window list centered; mode shown on left, git branch + time on right
set -g status-justify centre
set -g status-style "bg=default"

# Left: current mode (session name)
set -g status-left-length 20
set -g status-left "#[fg=blue,bold] #S #[fg=brightblack,nobold] │ "

# Right: git branch of active pane + clock
set -g status-right-length 60
set -g status-right "#[fg=brightblack]#(cd '#{pane_current_path}' 2>/dev/null && git symbolic-ref --short HEAD 2>/dev/null)  #[fg=blue,bold]%H:%M "

# Inactive window — name only (no index prefix, names are descriptive)
setw -g window-status-format "#[fg=brightblack,bg=default,noitalic] #W "

# Active window
setw -g window-status-current-format "#[fg=cyan,bg=default,bold] #W#{?window_zoomed_flag, ●,} "

# Message text
set -g message-style "fg=yellow,bg=default,bold"

# =============================================
# PLUGINS (TPM)
# =============================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
